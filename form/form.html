<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form for admission</title>
<link rel="stylesheet" href="formstyle.css">
</head>
<body>
<h1>Form for student admission</h1>
<form method="POST">
<label for="username">Name:</label>
<input type="text" id="username" name="username" placeholder="enter your username">
<div>        
<label for="Address">Address</label>
<input type="text" id="Address" name="address" placeholder="enter the Address">
</div>  
    <div class="choice"> 
        Choose your gender: 
        <label for="male">male</label>
        <input type="radio" id="male" name="gender">
        <label for="female">female</label>
        <input type="radio" id="female" name="gender">
    </div>  
    <div>
        <label for="phone_no.">Mobile no. </label>
        <input type="number" id="phone_no." placeholder="ex:8409042888">
        <label for="Address">Enter your city:</label>
        <input type="text" id="Address" placeholder="e.g. siwan.."></div>
    <div>
        <label for="code">Enter your city pincode:</label>
        <input type="number" id="code" placeholder="e.g. 841243">
    </div>    
    <div>
        <label for="finish">Submit</label>
        <input type="button" id="finish">
    </div>
    </form>
</body>
</html>
